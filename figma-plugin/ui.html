<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 16px;
      height: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    p {
      color: #a0a0a0;
      line-height: 1.5;
      flex: 1;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #7c5cfc;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    button:hover:not(:disabled) {
      opacity: 0.85;
    }

    button:disabled {
      background: #3a3a3a;
      color: #666;
      cursor: default;
    }

    .btn-secondary {
      background: #2c2c2c;
      border: 1px solid #444;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #3c3c3c;
    }

    #status {
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      display: none;
    }

    #status.success {
      background: #162a16;
      color: #4caf50;
      border: 1px solid #2a4a2a;
    }

    #status.error {
      background: #2a1616;
      color: #f87171;
      border: 1px solid #4a2a2a;
    }
  </style>
</head>

<body>
  <h2>Bridge Link</h2>
  <p>Sync your Figma variables to the local Bridge IDE token database.</p>
  <button id="syncBtn">Sync Variables to Bridge</button>
  <div style="height: 1px; background: #333; margin: 5px 0;"></div>
  <p>Hydrate Bridge AST using the currently selected Figma Component.</p>
  <button id="exportBtn" class="btn-secondary">Copy 'Code' to Clipboard</button>
  <div id="status"></div>

  <script>
    // The dev secret must match BRIDGE_SECRET in electron/ingestion-server.ts.
    // For production, this would be exchanged at runtime.
    const BRIDGE_URL = 'http://127.0.0.1:4545'
    const BRIDGE_SECRET = 'bridge-dev-secret-phase2'

    const btn = document.getElementById('syncBtn')
    const exportBtn = document.getElementById('exportBtn')
    const status = document.getElementById('status')

    function showStatus(type, message) {
      status.className = type
      status.textContent = message
      status.style.display = 'block'
    }

    function resetBtn() {
      btn.disabled = false
      btn.textContent = 'Sync Variables to Bridge'
      exportBtn.disabled = false
      exportBtn.textContent = "Copy 'Code' to Clipboard"
    }

    // Receive payload or error from code.js (Figma main thread)
    window.onmessage = async (event) => {
      const msg = event.data && event.data.pluginMessage
      if (!msg) return

      if (msg.type === 'payload') {
        try {
          const res = await fetch(`${BRIDGE_URL}/ingest`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-bridge-secret': BRIDGE_SECRET,
            },
            body: JSON.stringify(msg.data),
          })

          if (res.ok) {
            const json = await res.json()
            showStatus('success', `✓ Synced ${json.count} token${json.count === 1 ? '' : 's'} successfully.`)
          } else {
            const json = await res.json().catch(() => ({ error: res.statusText }))
            showStatus('error', `Server error ${res.status}: ${json.error ?? 'Unknown'}`)
          }
        } catch (err) {
          showStatus('error',
            `Network error: ${String(err)}\n\nMake sure Bridge IDE is open and running.`
          )
        }
        resetBtn()
      }

      if (msg.type === 'error') {
        showStatus('error', `Plugin error: ${msg.message}`)
        resetBtn()
      }

      if (msg.type === 'ast-payload') {
        const astData = typeof msg.data === 'string' ? msg.data : JSON.stringify(msg.data);
        const fullPayload = {
          type: "application/x-bridge-figma-ast",
          payload: astData
        };

        try {
          // Attempt automatic push to Bridge IDE
          const res = await fetch(`${BRIDGE_URL}/ingest-ast`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-bridge-secret': BRIDGE_SECRET,
            },
            body: JSON.stringify(fullPayload),
          });

          if (res.ok) {
            showStatus('success', '✓ Automatically synced layout to Bridge IDE!');
            resetBtn();
            return;
          }
        } catch (err) {
          // Fallback to clipboard if server is down or network fails
        }

        // Fallback: Copy to clipboard if auto-sync fails
        const clipboardString = JSON.stringify(fullPayload);
        const textArea = document.createElement("textarea");
        textArea.value = clipboardString;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          showStatus('success', '✓ Bridge IDE link busy. Copied to clipboard instead! Use Cmd+V in Bridge.');
        } catch (err) {
          showStatus('error', 'Failed to sync or copy.');
        }
        document.body.removeChild(textArea);
        resetBtn();
      }
    }

    btn.onclick = () => {
      btn.disabled = true
      btn.textContent = 'Syncing…'
      status.style.display = 'none'
      // Ask code.js to collect variables and send them back as 'payload'
      parent.postMessage({ pluginMessage: { type: 'sync' } }, '*')
    }

    exportBtn.onclick = () => {
      exportBtn.disabled = true
      exportBtn.textContent = 'Extracting...'
      status.style.display = 'none'
      parent.postMessage({ pluginMessage: { type: 'export-ast' } }, '*')
    }
  </script>
</body>

</html>
