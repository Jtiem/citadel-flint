appId: com.flint.glass
productName: Flint Glass
copyright: Copyright 2026 Flint

directories:
  buildResources: build-resources
  output: release

# ── Source exclusions ────────────────────────────────────────────────────────
# Only compiled output ships. All TypeScript source is excluded.
# electron-builder automatically resolves only production dependencies from
# package.json when node_modules is NOT listed explicitly here — dev deps
# (vite, tailwindcss, typescript, eslint, vitest, etc.) are excluded by default.
files:
  - dist/**/*
  - dist-electron/**/*
  - flint-mcp/dist/**/*
  - flint-mcp/package.json
  # flint-mcp is spawned as a child process (ELECTRON_RUN_AS_NODE=1) which
  # cannot read from ASAR. Its node_modules must be included so they can be
  # unpacked alongside the server code.
  - flint-mcp/node_modules/**/*
  - package.json
  # onnxruntime-web (91MB WebAssembly) is a transitive dep of @huggingface/transformers
  # but is never used in Electron's Node.js process. Exclude it explicitly.
  - "!node_modules/onnxruntime-web/**"
  # Exclude source code — testers get compiled JS only
  - "!src/**"
  - "!electron/**"
  - "!flint-mcp/src/**"
  - "!flint-vscode/**"
  - "!vscode-extension/**"
  - "!demos/**"
  - "!docs/**"
  - "!website/**"
  - "!.flint-context/**"
  - "!.claude/**"
  - "!.claude-flow/**"
  - "!.git/**"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/__tests__/**"
  - "!**/vitest.config.*"
  - "!**/tsconfig.*"
  - "!scripts/**"
  - "!CLAUDE.md"
  - "!HANDOFF.md"

# ── Extra resources ──────────────────────────────────────────────────────────
# Demo project shipped with beta builds for first-launch experience.
# Copied to process.resourcesPath so the main process can access it.
extraResources:
  - from: build-resources/demo-project
    to: build-resources/demo-project
    filter:
      - "**/*"

# ── ASAR ─────────────────────────────────────────────────────────────────────
asar: true
asarUnpack:
  # Native .node binaries must live outside the ASAR (dlopen requirement)
  - "**/*.node"
  # sqlite-vec distributes as .dylib on macOS, not .node — must also be unpacked
  - "**/*.dylib"
  # MCP server is spawned as a child process with ELECTRON_RUN_AS_NODE=1.
  # Child processes are plain Node.js — they CANNOT read from ASAR.
  # Therefore the ENTIRE flint-mcp directory (code + all dependencies) must
  # be unpacked so the child process can resolve imports normally.
  - "flint-mcp/**"
  # Native modules used by the Electron main process also need full unpacking
  # (the .node binary AND the JS wrapper + package.json for ESM resolution).
  - "node_modules/better-sqlite3/**"
  - "node_modules/sqlite-vec/**"
  - "node_modules/sqlite-vec-darwin-arm64/**"
  - "node_modules/sqlite-vec-darwin-x64/**"
  - "node_modules/sqlite-vec-linux-x64/**"
  - "node_modules/sqlite-vec-windows-x64/**"
  - "node_modules/bufferutil/**"
  - "node_modules/utf-8-validate/**"

# ── Native modules ───────────────────────────────────────────────────────────
# electron-rebuild handles better-sqlite3, sqlite-vec, bufferutil, utf-8-validate
npmRebuild: true

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  # Set to null to skip signing. Replace with your Developer ID when ready:
  # identity: "Developer ID Application: Your Name (TEAM_ID)"
  identity: null
  #
  # Notarization — electron-builder 26.8+ requires a boolean here.
  # Set to true when APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
  # are configured as env vars / GitHub Secrets. electron-builder reads the
  # credentials from env automatically. Set to false to skip.
  notarize: false

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development

# ── Before-build hook ────────────────────────────────────────────────────────
# Disabled: build:beta:mac already runs `npm run build` before electron-builder,
# so the beforeBuild hook would double-build. Re-enable if you need a standalone
# `electron-builder` invocation without a preceding `npm run build`.
# beforeBuild: scripts/before-build.cjs

# ── GitHub Releases publish ───────────────────────────────────────────────────
# electron-updater reads this section to locate the update feed.
# electron-updater is in package.json dependencies — auto-update is functional.
publish:
  provider: github
  owner: Jtiem
  repo: lunar-elevator-flint

# ── DMG layout ───────────────────────────────────────────────────────────────
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
