# ──────────────────────────────────────────────────────────────────────────────
# Build + Release
# ──────────────────────────────────────────────────────────────────────────────
# Triggered on version tags (v*.*.*). Builds Flint Glass for macOS, Linux,
# and Windows, then publishes artifacts to GitHub Releases via electron-builder.
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#
#   ALL PLATFORMS:
#     GH_TOKEN — GitHub Personal Access Token with `contents: write` scope.
#                Used by electron-builder to upload release artifacts.
#                Create at: https://github.com/settings/tokens
#     NPM_TOKEN              — npm Classic token with 'publish' permission.
#                             Create at: https://www.npmjs.com/settings/<username>/tokens
#
#   macOS CODE SIGNING:
#     CSC_LINK              — Base64-encoded .p12 certificate file.
#                             Export from Keychain Access, then:
#                             base64 -i certificate.p12 | pbcopy
#     CSC_KEY_PASSWORD       — Password for the .p12 certificate.
#     APPLE_ID               — Apple ID email for notarization.
#     APPLE_APP_SPECIFIC_PASSWORD — App-specific password for notarization.
#                             Generate at: https://appleid.apple.com/account/manage
#     APPLE_TEAM_ID          — 10-character Apple Developer Team ID.
#                             Find at: https://developer.apple.com/account
#
#   WINDOWS CODE SIGNING:
#     WIN_CSC_LINK           — Base64-encoded .pfx certificate for Windows signing.
#     WIN_CSC_KEY_PASSWORD   — Password for the .pfx certificate.
#
# ──────────────────────────────────────────────────────────────────────────────

name: Build + Release

on:
  push:
    tags:
      - "v*.*.*"

# Only one release build per tag
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel universal build (macos-14 = ARM64 runner)
          - os: macos-14
            platform: mac
          # Linux AppImage (x64)
          - os: ubuntu-latest
            platform: linux
          # Windows NSIS installer (x64)
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install MCP engine dependencies ──────────────────────────────────
      - name: Install flint-mcp dependencies
        run: |
          cd flint-mcp
          npm ci

      # ── 5. Build flint-mcp engine (flint-ci imports from flint-mcp/dist/) ──────
      - name: Build flint-mcp
        run: |
          cd flint-mcp
          npm run build

      # ── 6. Build flint-ci GitHub Action bundle ───────────────────────────────
      - name: Build flint-ci
        run: |
          cd flint-ci
          npm ci
          npm run build

      # ── 7. TypeScript — root project ────────────────────────────────────────
      - name: Typecheck (root)
        run: npx tsc --noEmit

      # ── 8. TypeScript — MCP engine ──────────────────────────────────────────
      - name: Typecheck (flint-mcp)
        run: npx tsc --noEmit --project flint-mcp/tsconfig.json

      # ── 9. Core tests ───────────────────────────────────────────────────────
      - name: Core tests
        run: npm test

      # ── 10. Glass component tests ─────────────────────────────────────────────
      - name: Glass component tests
        run: npm run test:react

      # ── 11. MCP engine tests ─────────────────────────────────────────────────
      - name: MCP engine tests
        run: |
          cd flint-mcp
          npm test

      # ── 12. Build Vite + Electron ────────────────────────────────────────────
      # First compile the Electron main process and Vite renderer bundle,
      # then package the output into platform-specific installers.
      - name: Build Vite + Electron
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          # GitHub token for uploading release artifacts
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # Disable code signing auto-discovery until certificates are configured.
          # When you add CSC_LINK to GitHub Secrets, change this to 'true'.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

          # ── macOS code signing + notarization ─────────────────────────────
          # These are only needed on the macOS runner.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}

          # ── Windows code signing ──────────────────────────────────────────
          # These are only needed on the Windows runner.
          WIN_CSC_LINK: ${{ matrix.platform == 'win' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ matrix.platform == 'win' && secrets.WIN_CSC_KEY_PASSWORD || '' }}

  # ── Web Glass build ──────────────────────────────────────────────────────────
  # Builds the browser-based Glass SPA + server CLI bundle and uploads a tarball
  # to the GitHub Release so users can run `npx flint-glass` without Electron.
  build-web:
    name: Build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install flint-mcp dependencies
        run: cd flint-mcp && npm ci

      - name: Build flint-mcp
        run: cd flint-mcp && npm run build

      - name: Build flint-ci
        run: |
          cd flint-ci
          npm ci
          npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build web SPA
        run: npm run build:web

      - name: Build server CLI bundle
        run: npm run build:server

      - name: Create web release tarball
        run: |
          tar -czf "flint-glass-web-${{ github.ref_name }}.tar.gz" \
            dist-web/ \
            dist-server/ \
            flint-ci/dist/ \
            bin/ \
            server/ \
            shared/ \
            build-resources/demo-project/ \
            package.json

      - name: Upload web release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: flint-glass-web-${{ github.ref_name }}.tar.gz
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install flint-mcp dependencies
        run: cd flint-mcp && npm ci

      - name: Build flint-mcp
        run: cd flint-mcp && npm run build

      - name: Build web SPA
        run: npm run build:web

      - name: Build server CLI bundle
        run: npm run build:server

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
