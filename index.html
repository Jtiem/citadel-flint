<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-eval' 'unsafe-inline' https://sandpack-bundler.codesandbox.io https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com;
        frame-src 'self' https://*.codesandbox.io blob: http://localhost:* http://127.0.0.1:*;
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com;
        connect-src 'self' ws://localhost:* http://localhost:* ws://127.0.0.1:* http://127.0.0.1:* https:;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https://cdn.jsdelivr.net https://unpkg.com;
      "
    />
    <title>Bridge IDE</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-skeleton" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#030712;flex-direction:column;gap:16px;">
        <div style="font-size:24px;font-weight:700;background:linear-gradient(to right,#818cf8,#a78bfa,#ec4899);-webkit-background-clip:text;color:transparent;">Bridge Glass</div>
        <div style="display:flex;gap:6px;">
          <div class="boot-dot" style="width:6px;height:6px;border-radius:50%;background:#818cf8;animation:pulse 1.4s ease-in-out infinite;"></div>
          <div class="boot-dot" style="width:6px;height:6px;border-radius:50%;background:#818cf8;animation:pulse 1.4s ease-in-out 0.2s infinite;"></div>
          <div class="boot-dot" style="width:6px;height:6px;border-radius:50%;background:#818cf8;animation:pulse 1.4s ease-in-out 0.4s infinite;"></div>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
