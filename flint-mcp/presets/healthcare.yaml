# @flint/healthcare — HIPAA + PHI masking + FDA SaMD governance
# Extends: coercive enforcement, tight thresholds, long retention.
project: "@flint/healthcare"
domain: healthcare
classification: restricted

rules:
  mithril:
    mode: coercive
    delta_e: 1.5
    delta_e_critical: 6.0
    ignore:
      - "**/node_modules/**"
  accessibility:
    level: AA
    mode: coercive
  export_gate:
    block_on_overrides: true
  baseline:
    enabled: false

trust:
  default_tier: junior
  allow_demotion: true
  escalation:
    - when: { red_count: ">= 2", window: session }
      then: require_review
    - when: { mutation_velocity: ">= 10", window: 5m }
      then: block
  promotion:
    clean_sessions: 10
    security_validation: true
    governance_signoff: true

scoring:
  weights:
    coercive: 0.95
    normative: 0.8
    advisory: 0.5
    recency: 0.7

content:
  style_guide: google

audit:
  retention: 2190d
  export: [json, sarif]
